{%extends 'base.html'%}
{%block content%}
<h1>Blog</h1>
{%for post in posts%}
    <article>
    <h2><a href="{%url'post_detail' post.slug%}">{{post.title}}</a></h2>
    <p>By {{post.author}} | {{post.created_at|date:"F j, Y"}}</p>

    <p>{{post.content|truncatewords:30}}</p>

    </article>

    {%empty%}

        <p>No posts available.</p>

{%endfor%}
{%endblock%}

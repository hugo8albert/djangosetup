{%extends 'base.html'%}
{%block content%}

<h2> Log In</h2>
{%if messages%}
    {for message in messages%}
        <p>{{Message}}</p>
    {%endfor%}
{%endif%}

<form method ="post">
    {csrf_token%}
    {{form.as_p}}
    <button type="submit">Log In</button>
</form>

<p>Need an accout? <a href="{%url 'register'%}">Register>/a></p>

{%endblock%}
